<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{Page_Title}}</title>
</head>
<body>
    <h1>Hello {{username}} form {{city}}!</h1>
    <h2>Fruits I like: </h2>
    <ul>
        {% for fruits in fruits %}
            <li>{{fruits}}</li>
        {%empty%}
            <li>NO fruits today :(</li>
        {%endfor%}
    </ul>

    <p>Uppercase city: {{ city|upper }}</p>
</body>
</html>
